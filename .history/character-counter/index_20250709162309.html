<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Counter</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/jsx">
    import { useState } from 'react';
    import { Bar } from 'https://cdn.jsdelivr.net/npm/react-chartjs-2@5.2.0/+esm';
    import { Chart as ChartJS, CategoryScale, LinearScale, BarElement, Title, Tooltip, Legend } from 'https://cdn.jsdelivr.net/npm/chart.js@4.4.4/+esm';

    ChartJS.register(CategoryScale, LinearScale, BarElement, Title, Tooltip, Legend);

    // CharacterCounter Component
    function CharacterCounter({ text, setText, includeSpaces, setIncludeSpaces, charLimit, setCharLimit }) {
      return (
        <div className="w-full max-w-md mb-4">
          <textarea
            className="w-full p-2 border rounded resize-y"
            value={text}
            onChange={(e) => setText(e.target.value)}
            placeholder="Enter your text here..."
            aria-label="Text input for character counter"
            rows="5"
          />
          <div className="flex justify-between mt-2">
            <label>
              <input
                type="checkbox"
                checked={includeSpaces}
                onChange={() => setIncludeSpaces(!includeSpaces)}
                aria-label="Include spaces in character count"
              />
              Include Spaces
            </label>
            <div>
              <label htmlFor="charLimit" className="mr-2">Limit:</label>
              <input
                id="charLimit"
                type="number"
                value={charLimit}
                onChange={(e) => setCharLimit(Number(e.target.value))}
                className="w-16 p-1 border rounded"
                aria-label="Set character limit"
              />
            </div>
          </div>
        </div>
      );
    }

    // CounterDisplay Component
    function CounterDisplay({ text, includeSpaces, charLimit }) {
      const charCount = includeSpaces ? text.length : text.replace(/\s/g, "").length;
      const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
      const sentenceCount = text.trim() ? text.split(/[.!?]+/).filter(Boolean).length : 0;
      const readingTime = Math.ceil(wordCount / 200);

      return (
        <div className="w-full max-w-md mb-4">
          <p>Characters: <span className={charCount > charLimit ? "text-red-500" : ""}>{charCount}</span> / {charLimit}</p>
          <p>Words: {wordCount}</p>
          <p>Sentences: {sentenceCount}</p>
          <p>Estimated Reading Time: {readingTime} min</p>
        </div>
      );
    }

    // LetterDensityGraph Component
    function LetterDensityGraph({ text }) {
      const letterCounts = {};
      text.toLowerCase().replace(/[^a-z]/g, "").split("").forEach((char) => {
        letterCounts[char] = (letterCounts[char] || 0) + 1;
      });

      const data = {
        labels: Object.keys(letterCounts).sort(),
        datasets: [
          {
            label: "Letter Frequency",
            data: Object.values(letterCounts),
            backgroundColor: "rgba(75, 192, 192, 0.6)",
            borderColor: "rgba(75, 192, 192, 1)",
            borderWidth: 1,
          },
        ],
      };

      const options = {
        responsive: true,
        plugins: { legend: { position: "top" }, title: { display: true, text: "Letter Density" } },
      };

      return (
        <div className="w-full max-w-md">
          <Bar data={data} options={options} />
        </div>
      );
    }

    // ThemeSwitcher Component
    function ThemeSwitcher({ theme, setTheme }) {
      return (
        <button
          onClick={() => setTheme(theme === "light" ? "dark" : "light")}
          className="mb-4 p-2 bg-blue-500 text-white rounded"
          aria-label={`Switch to ${theme === "light" ? "dark" : "light"} theme`}
        >
          Toggle {theme === "light" ? "Dark" : "Light"} Theme
        </button>
      );
    }

    // App Component
    function App() {
      const [text, setText] = useState("");
      const [includeSpaces, setIncludeSpaces] = useState(true);
      const [charLimit, setCharLimit] = useState(280);
      const [theme, setTheme] = useState("light");

      return (
        <div className={`min-h-screen ${theme === "light" ? "bg-gray-100" : "bg-gray-900 text-white"} flex flex-col items-center justify-center p-4`}>
          <ThemeSwitcher theme={theme} setTheme={setTheme} />
          <h1 className="text-3xl font-bold mb-4">Character Counter</h1>
          <CharacterCounter
            text={text}
            setText={setText}
            includeSpaces={includeSpaces}
            setIncludeSpaces={setIncludeSpaces}
            charLimit={charLimit}
            setCharLimit={setCharLimit}
          />
          <CounterDisplay text={text} includeSpaces={includeSpaces} charLimit={charLimit} />
          <LetterDensityGraph text={text} />
        </div>
      );
    }

    // Render the App
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
